<!DOCTYPE html>
<html>
<head>

<title>Andaman and Nicobar Islands Tourist Cards</title>
<link rel="stylesheet" href="E:\Academics\Group Projects\UI Project\india-tourism-website\Main Files\ScrollBar.css">
<link rel="stylesheet" href="E:\Academics\Group Projects\UI Project\india-tourism-website\Main Files\RightStyle.css">
<link rel="stylesheet" href="E:\Academics\Group Projects\UI Project\india-tourism-website\Main Files\CardStyle.css">
<link rel="stylesheet" href="E:\Academics\Group Projects\UI Project\india-tourism-website\Main Files\gradient.css">

<style>


/* Card styles */

body {
  background-color: black;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  justify-content: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px;
  padding: 50px 0;
}

/* ⭐ STAR */
.star {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    cursor: pointer;
    z-index: 10;
    color: white;
    transition: 0.3s;
}

.card-back .star {
    color: black;
}

.star.active {
    color: gold;
}

/* Card backgrounds */
.card-front.Havelock{
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url("Havelock.jpg");
    background-size: cover;
    background-position: center 45%;
    background-repeat: no-repeat;
}

.card-front.PortBlair {
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url("PortBlair.jpg");
    background-size: cover;
    background-position: center 45%;
    background-repeat: no-repeat;
}

.card-front.NeilIsland {
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url("NeilIsland.jpg");
    background-size: cover;
    background-position: center 45%;
    background-repeat: no-repeat;
}

.card-front.Ross{
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url("Ross.jpg");
    background-size: cover;
    background-position: center 45%;
    background-repeat: no-repeat;
}

.card-front.Baratang {
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url("Baratang.jpg");
    background-size: cover;
    background-position: center 45%;
    background-repeat: no-repeat;
}




/* Card */
.card {
    width: 300px;
    height: 250px;
    perspective: 1000px;
    position: relative;
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

.card:hover .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.card-front {
  color: white;
  font-weight: bold;
  font-size: 1.2rem;
}

.card-back {
  background: #D2B48C;
  color: black;
  transform: rotateY(180deg);
}

.card-back a {
  color: black;
  font-weight: bold;
  text-decoration: none;
}

.card-back a:hover {
  text-decoration: underline;
}

/* Title */
.right-title {
    color: #e5e5e5;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 25px;
    padding-bottom: 30px;
    border-bottom: 2px solid #8B4513;
}

.right-section {
    width: 100%;
    padding: 20px 30px;
}
</style>
</head>
<body>
  <div class="right-section">
<div class="right-title">Top Spots</div>

<div class="container">

  <!-- Havelock -->
  <div class="card">
    <div class="card-inner">
      <div class="card-front Havelock">
        <div class="star" data-id="Havelock">&#9734;</div>
        Havelock
      </div>
      <div class="card-back">
        <div class="star" data-id="Havelock">&#9734;</div>
        <a href="Havelock.html" target="content_frame">View Info</a>
      </div>
    </div>
  </div>

  <!--PortBlair-->
  <div class="card">
    <div class="card-inner">
      <div class="card-front PortBlair">
        <div class="star" data-id="PortBlair">&#9734;</div>
        PortBlair
      </div>
      <div class="card-back">
        <div class="star" data-id="PortBlair">&#9734;</div>
        <a href="PortBlair.html" target="content_frame">View Info</a>
      </div>
    </div>
  </div>

  <!-- NeilIsland -->
  <div class="card">
    <div class="card-inner">
      <div class="card-front NeilIsland">
        <div class="star" data-id="NeilIsland">&#9734;</div>
        NeilIsland
      </div>
      <div class="card-back">
        <div class="star" data-id="NeilIsland">&#9734;</div>
        <a href="NeilIsland.html" target="content_frame">View Info</a>
      </div>
    </div>
  </div>

  <!-- Ross -->
  <div class="card">
    <div class="card-inner">
      <div class="card-front Ross">
        <div class="star" data-id="Ross">&#9734;</div>
        Ross
      </div>
      <div class="card-back">
        <div class="star" data-id="Ross">&#9734;</div>
        <a href="Ross.html" target="content_frame">View Info</a>
      </div>
    </div>
  </div>

  <!-- Baratang -->
  <div class="card">
    <div class="card-inner">
      <div class="card-front Baratang">
        <div class="star" data-id="Baratang">&#9734;</div>
        Baratang
      </div>
      <div class="card-back">
        <div class="star" data-id="Baratang">&#9734;</div>
        <a href="Baratang.html" target="content_frame">View Info</a>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// ===== USER & KEY =====
const currentUser = localStorage.getItem("currentUser");
const key = currentUser ? "myStars_" + currentUser : null;

// ===== LOAD SAVED =====
let saved = key ? JSON.parse(localStorage.getItem(key)) || [] : [];

// ===== INIT ALL STARS =====
const stars = document.querySelectorAll(".star");

stars.forEach(star => {
  const id = star.getAttribute("data-id");

  // initial fill
  if (saved.includes(id)) {
    star.textContent = "★";
    star.classList.add("active");
  } else {
    star.textContent = "☆";
    star.classList.remove("active");
  }

  // click
  star.addEventListener("click", (e) => {
    e.stopPropagation();

    if (!key) {
      alert("Please login first");
      return;
    }

    const isActive = saved.includes(id);

    if (isActive) {
      saved = saved.filter(x => x !== id);
    } else {
      saved.push(id);
    }

    // update all matching stars (front/back)
    document.querySelectorAll(`.star[data-id="${id}"]`).forEach(s => {
      if (isActive) {
        s.textContent = "☆";
        s.classList.remove("active");
      } else {
        s.textContent = "★";
        s.classList.add("active");
      }
    });

    // save per user
    localStorage.setItem(key, JSON.stringify(saved));
  });
});
</script>

</body>
</html>
