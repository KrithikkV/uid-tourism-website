<!DOCTYPE html>

<meta charset="UTF-8">
<title>Favorites</title>

<style>

/* ===== BODY (FIXED) ===== */
body {
  background-color: black;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, sans-serif;
}

/* ===== HEADER FIX ===== */
iframe {
  display: block;
  width: 100%;
  height: 120px;
  border: none;
}

/* ===== WRAPPER ===== */
.wrapper {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== TITLE ===== */
.title {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #e5e5e5;
  font-size: 1.8rem;
  font-weight: 700;
  justify-content: center;
  margin: 30px 0 20px 0;
  padding-bottom: 10px;
  border-bottom: 2px solid #8B4513;
}

/* ===== STATE SECTION ===== */
.state-section {
  margin-bottom: 50px;
}

.state-title {
  color: #e5e5e5;
  font-size: 1.4rem;
  font-weight: 600;
  margin-bottom: 15px;
  border-left: 4px solid #8B4513;
  padding-left: 10px;
}

/* ===== GRID FIX ===== */
.state-grid {
  display: grid;
  grid-template-columns: repeat(3, 300px);
  gap: 30px;
  justify-content: center;
}

/* ===== STAR ===== */
.star {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 22px;
  cursor: pointer;
  color: gold;
}

/* ===== CARD ===== */
.card {
  width: 300px;
  height: 250px;
  perspective: 1000px;
  position: relative;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.card:hover .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.card-front {
  color: white;
  font-weight: bold;
  font-size: 1.2rem;
}

.card-back {
  background: #D2B48C;
  color: black;
  transform: rotateY(180deg);
}

.card-back a {
  color: black;
  font-weight: bold;
  text-decoration: none;
}

// ===== CONTAINER =====
const container = document.getElementById("favoritesContainer");

// ===== EMPTY =====
if (saved.length === 0) {
  container.innerHTML = "<p style='color:white; text-align:center;'>No favorites selected</p>";
}

// ===== GROUP =====
const grouped = {};

saved.forEach(id => {
  const place = data[id];
  if (!place) return;

  if (!grouped[place.state]) grouped[place.state] = [];
  grouped[place.state].push({ id, ...place });
});

// ===== RENDER =====
for (let state in grouped) {
  const section = document.createElement("div");
  section.className = "state-section";

  section.innerHTML = `
    <div class="state-title">${state}</div>
    <div class="state-grid">
      ${grouped[state].map(place => `
        <div class="card">
          <div class="card-inner">

            <div class="card-front ${place.class}">
              <div class="star" data-id="${place.id}">★</div>
              ${place.name}
            </div>

            <div class="card-back">
              <div class="star" data-id="${place.id}">★</div>
              <a href="${place.link}">View Info</a>
            </div>

          </div>
        </div>
      `).join("")}
    </div>
  `;

  container.appendChild(section);
}
